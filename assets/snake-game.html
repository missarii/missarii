<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake Game - Missari</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    .game-container {
      background: linear-gradient(135deg, #0d1117, #161b22);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 247, 255, 0.1), inset 0 0 60px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(0, 247, 255, 0.2);
    }
    h1 {
      text-align: center;
      color: #00f7ff;
      font-size: 24px;
      margin-bottom: 15px;
      text-shadow: 0 0 20px rgba(0, 247, 255, 0.5);
    }
    .score-board {
      display: flex;
      justify-content: space-between;
      color: #7b2ff7;
      font-size: 18px;
      margin-bottom: 10px;
      padding: 0 5px;
    }
    canvas {
      display: block;
      margin: 0 auto;
      border: 2px solid rgba(0, 247, 255, 0.3);
      border-radius: 10px;
      background: #0d1117;
      box-shadow: 0 0 30px rgba(0, 247, 255, 0.05);
    }
    .controls {
      text-align: center;
      margin-top: 15px;
    }
    .controls button {
      background: linear-gradient(135deg, #00f7ff, #7b2ff7);
      border: none;
      color: #0d1117;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 16px;
      padding: 10px 30px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .controls button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 247, 255, 0.4);
    }
    .controls p {
      color: #8b949e;
      font-size: 14px;
      margin-top: 10px;
    }
    .game-over {
      color: #ff00e4;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
      text-shadow: 0 0 20px rgba(255, 0, 228, 0.5);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🐍 SNAKE GAME</h1>
    <div class="score-board">
      <span>🍎 Score: <span id="score">0</span></span>
      <span>🏆 High: <span id="highScore">0</span></span>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="gameOver" class="game-over"></div>
    <div class="controls">
      <button onclick="resetGame()">🔄 New Game</button>
      <p>⬆ ⬇ ⬅ ➡  or  WASD</p>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const gameOverEl = document.getElementById('gameOver');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let food = {};
    let direction = {x: 0, y: 0};
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameRunning = false;
    let gameLoop;

    highScoreEl.textContent = highScore;

    function generateFood() {
      food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
      };
      // Make sure food doesn't spawn on snake
      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          generateFood();
          return;
        }
      }
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid
      ctx.strokeStyle = 'rgba(48, 54, 61, 0.3)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }

      // Draw food (apple)
      const gradient = ctx.createRadialGradient(
        food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, 2,
        food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2
      );
      gradient.addColorStop(0, '#ff4444');
      gradient.addColorStop(0.5, '#ff0000');
      gradient.addColorStop(1, '#cc0000');
      ctx.fillStyle = gradient;
      ctx.shadowColor = '#ff0000';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Draw snake
      for (let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const ratio = i / snake.length;
        
        // Head to tail gradient: cyan to purple
        const r = Math.floor(0 + ratio * 123);
        const g = Math.floor(247 - ratio * 247);
        const b = Math.floor(255 - ratio * 255 + ratio * 247);
        
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.shadowColor = i === 0 ? '#00f7ff' : '#7b2ff7';
        ctx.shadowBlur = i === 0 ? 20 : 10;
        
        const padding = 1;
        const x = seg.x * gridSize + padding;
        const y = seg.y * gridSize + padding;
        const size = gridSize - padding * 2;
        
        // Rounded rect for each segment
        const radius = 4;
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + size - radius, y);
        ctx.quadraticCurveTo(x + size, y, x + size, y + radius);
        ctx.lineTo(x + size, y + size - radius);
        ctx.quadraticCurveTo(x + size, y + size, x + size - radius, y + size);
        ctx.lineTo(x + radius, y + size);
        ctx.quadraticCurveTo(x, y + size, x, y + size - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        ctx.fill();
        
        // Eyes on head
        if (i === 0) {
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'white';
          let eyeX1, eyeY1, eyeX2, eyeY2;
          if (direction.x === 1) {
            eyeX1 = x + size - 6; eyeY1 = y + 4;
            eyeX2 = x + size - 6; eyeY2 = y + size - 4;
          } else if (direction.x === -1) {
            eyeX1 = x + 6; eyeY1 = y + 4;
            eyeX2 = x + 6; eyeY2 = y + size - 4;
          } else if (direction.y === 1) {
            eyeX1 = x + 4; eyeY1 = y + size - 6;
            eyeX2 = x + size - 4; eyeY2 = y + size - 6;
          } else {
            eyeX1 = x + 4; eyeY1 = y + 6;
            eyeX2 = x + size - 4; eyeY2 = y + 6;
          }
          ctx.beginPath();
          ctx.arc(eyeX1, eyeY1, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(eyeX2, eyeY2, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#0d1117';
          ctx.beginPath();
          ctx.arc(eyeX1, eyeY1, 1.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(eyeX2, eyeY2, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.shadowBlur = 0;
    }

    function update() {
      if (!gameRunning) return;

      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

      // Wall wrap
      if (head.x < 0) head.x = tileCount - 1;
      if (head.x >= tileCount) head.x = 0;
      if (head.y < 0) head.y = tileCount - 1;
      if (head.y >= tileCount) head.y = 0;

      // Self collision
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('snakeHighScore', highScore);
        }
        generateFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      gameRunning = false;
      clearInterval(gameLoop);
      gameOverEl.textContent = `💀 GAME OVER - Score: ${score}`;
    }

    function resetGame() {
      clearInterval(gameLoop);
      snake = [{x: 10, y: 10}];
      direction = {x: 0, y: 0};
      score = 0;
      scoreEl.textContent = '0';
      gameOverEl.textContent = '';
      generateFood();
      gameRunning = true;
      draw();
      gameLoop = setInterval(update, 100);
    }

    document.addEventListener('keydown', (e) => {
      if (!gameRunning) return;
      switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          if (direction.y === 0) { direction = {x: 0, y: -1}; }
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          if (direction.y === 0) { direction = {x: 0, y: 1}; }
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          if (direction.x === 0) { direction = {x: -1, y: 0}; }
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          if (direction.x === 0) { direction = {x: 1, y: 0}; }
          break;
      }
    });

    // Touch controls for mobile
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchend', (e) => {
      if (!gameRunning) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && direction.x === 0) direction = {x: 1, y: 0};
        else if (dx < 0 && direction.x === 0) direction = {x: -1, y: 0};
      } else {
        if (dy > 0 && direction.y === 0) direction = {x: 0, y: 1};
        else if (dy < 0 && direction.y === 0) direction = {x: 0, y: -1};
      }
    });

    // Start game
    generateFood();
    gameRunning = true;
    draw();
    gameLoop = setInterval(update, 100);
  </script>
</body>
</html>
